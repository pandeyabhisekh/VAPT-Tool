<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPT Automation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { background: #2c3e50; color: white; padding: 60px 0; margin-bottom: 40px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .btn-primary { background-color: #3498db; border: none; }
        .btn-primary:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4">VAPT Automation Tool</h1>
            <p class="lead">Production-Grade Security Assessment Scanner</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <form action="/scan" method="post">
                        <div class="mb-3">
                            <label for="target_url" class="form-label">Target URL</label>
                            <input type="url" class="form-control" id="target_url" name="target_url" placeholder="http://example.com" required>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="username" class="form-label">Username (Optional)</label>
                                <input type="text" class="form-control" id="username" name="username">
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label">Password (Optional)</label>
                                <input type="password" class="form-control" id="password" name="password">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="headers" class="form-label">Custom Headers (One per line, Key: Value)</label>
                            <textarea class="form-control" id="headers" name="headers" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="cookies" class="form-label">Cookies (Semicolon separated, key=value)</label>
                            <textarea class="form-control" id="cookies" name="cookies" rows="2"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg" id="scanBtn">Generate VAPT Report</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; color: white; justify-content: center; align-items: center; flex-direction: column;">
        <div class="spinner-border text-light mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4>Scanning in progress...</h4>
        <p>This may take a few minutes depending on the target size.</p>
    </div>

    <script>
        document.querySelector('form').onsubmit = function() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        };
    </script>
</body>
</html>
